<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Track & Lab Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script> <!-- SheetJS pour lire les fichiers Excel. Transformer le ficher js pour lire les .csv -->
  <script src="dashboard.js"></script>
</head>
<body class="page">

  <nav class="navbar"> <!-- Barre de navigation -->
    <a href="index.html" class="navbar__brand">Track &amp; Lab Manager</a>
    <div class="navbar__links">
      <a href="index.html">&#8592; Retour</a>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="calculette.html">Calculette</a>
    </div>
  </nav>

  <div class="page__content">
    
    <div class="card">
      <h1 class="page__title">Dashboard</h1>
      <p class="page__subtitle">Découvrez tous vos bilans par épreuves et plus encore</p>
    </div>

    <div class="kpi-grid"> <!-- Indicateurs clés -->
      <div class="kpi">
        <div class="kpi__label">Lignes</div>
        <div class="kpi__value">—</div>
      </div>
      <div class="kpi">
        <div class="kpi__label">Colonnes</div>
        <div class="kpi__value">—</div>
      </div>
      <div class="kpi">
        <div class="kpi__label">Fichier</div>
        <div class="kpi__value">—</div>
      </div>
    </div>

    <div class="card"> <!-- Tableau -->
      <div class="card__title card__research">
        <span>Données</span>
        <div>
          <input class="search-input" type="text" placeholder="Rechercher…"/>
        </div>
      </div>

      <div id="output"></div>

      <div class="table-wrapper"> <!-- Tableau -->
        <div class="empty-state">
          <div class="empty-state__icon">&#9783;</div>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
